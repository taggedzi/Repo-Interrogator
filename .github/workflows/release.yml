name: Release

on:
  push:
    tags:
      - "v*"
      - "release-*"
  workflow_dispatch:
    inputs:
      publish_to_pypi:
        description: "Publish to PyPI (requires PYPI_API_TOKEN secret)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        run: |
          git clone "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" .
          git checkout ${{ github.sha }}

      - name: Install Build Tooling
        run: |
          python3.12 -m pip install --upgrade pip
          python3.12 -m pip install build

      - name: Build Artifacts
        run: python3.12 -m build

      - name: Generate Deterministic Release Notes
        run: |
          python3.12 scripts/generate_release_notes.py \
            --repo-root . \
            --to-ref "${GITHUB_SHA}" \
            --output .repo_mcp/release_notes.md

      - name: Artifact Import Smoke Test (Wheel)
        run: |
          python3.12 -m pip install dist/*.whl
          python3.12 -c "import repo_mcp, repo_mcp.server; print('wheel import ok')"

      - name: Artifact Import Smoke Test (Sdist)
        run: |
          python3.12 -m pip uninstall -y repo-interrogator || true
          python3.12 -m pip install dist/*.tar.gz
          python3.12 -c "import repo_mcp, repo_mcp.server; print('sdist import ok')"

      - name: Create GitHub Release and Upload Artifacts
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            dist/*.whl dist/*.tar.gz \
            --title "$TAG" \
            --notes-file .repo_mcp/release_notes.md

      - name: Optional PyPI Publish (Guarded)
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.publish_to_pypi == 'true') || (github.event_name == 'push' && vars.PUBLISH_PYPI == 'true') }}
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python3.12 -m pip install twine
          python3.12 -m twine check dist/*
          python3.12 -m twine upload dist/*
