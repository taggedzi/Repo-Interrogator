name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
    inputs:
      run_perf_guardrails:
        description: "Run optional warning-only perf drift guardrails"
        required: false
        default: false
        type: boolean

jobs:
  lint-type-test-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        run: |
          git init
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin ${{ github.sha }}
          git checkout FETCH_HEAD

      - name: Select Python
        run: |
          PYTHON_DIR=$(ls -d /opt/hostedtoolcache/Python/${{ matrix.python-version }}.*/x64 2>/dev/null | sort -V | tail -1)
          if [ -z "$PYTHON_DIR" ]; then
            echo "Python ${{ matrix.python-version }} not found in tool cache" >&2
            exit 1
          fi
          echo "$PYTHON_DIR/bin" >> "$GITHUB_PATH"
          echo "PYTHON=$PYTHON_DIR/bin/python3" >> "$GITHUB_ENV"

      - name: Install Tooling
        run: |
          $PYTHON -m pip install --upgrade pip
          $PYTHON -m pip install ruff mypy pytest build

      - name: Ruff Format Check
        run: $PYTHON -m ruff format --check .

      - name: Ruff Lint
        run: $PYTHON -m ruff check .

      - name: Type Check
        run: $PYTHON -m mypy src

      - name: Test
        run: $PYTHON -m pytest -q

      - name: Build Artifacts
        run: $PYTHON -m build

      - name: Install Wheel Smoke Test
        run: |
          $PYTHON -m pip uninstall -y repo-interrogator || true
          $PYTHON -m pip install dist/*.whl
          $PYTHON -c "import repo_mcp, repo_mcp.server; print('ok')"

      - name: Install Sdist Smoke Test
        run: |
          $PYTHON -m pip uninstall -y repo-interrogator || true
          $PYTHON -m pip install dist/*.tar.gz
          $PYTHON -c "import repo_mcp, repo_mcp.server; print('ok')"

  perf-guardrails:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_perf_guardrails }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          git init
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin ${{ github.sha }}
          git checkout FETCH_HEAD

      - name: Install Tooling
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install ruff mypy pytest

      - name: Perf Guardrail Check (optional, warning-only drift)
        run: |
          python3 scripts/perf_guardrail_check.py \
            --repo-root . \
            --baseline .repo_mcp/perf/baselines/ci-self.json \
            --scenarios self \
            --runs 1 \
            --threshold-percent 20 \
            --bootstrap-if-missing
